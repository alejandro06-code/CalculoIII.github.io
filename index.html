<!DOCTYPE html><html><head><meta charset='utf-8'><link rel='stylesheet' href='css/styles.css'></head><body><header><h1>Repositorio de Cálculo III</h1></header><div class='container'><div id='mods' class='grid'></div></div><script>fetch('js/data.json').then(r=>r.json()).then(d=>mods.innerHTML=d.modulos.map(m=>`<div class='card'><h2>${m.titulo}</h2><a class='btn' href='modulo.html?id=${m.id}'>Abrir módulo</a></div>`).join(''));</script></body></html>
