<!DOCTYPE html><html><head><meta charset='utf-8'><link rel='stylesheet' href='css/styles.css'></head><body><header><h1 id='t'></h1></header><div class='container'><div id='c' class='grid'></div></div><script>const id=new URLSearchParams(location.search).get('id');fetch('js/data.json').then(r=>r.json()).then(d=>{let m=d.modulos.find(x=>x.id===id);t.textContent=m.titulo;c.innerHTML=m.lecciones.map(l=>`<div class='card'><h3>${l.titulo}</h3><a class='btn' href='leccion.html'>Abrir</a></div>`).join('');});</script></body></html>
